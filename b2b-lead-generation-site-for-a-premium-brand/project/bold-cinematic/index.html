<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1280, height=720" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1280px; height: 720px;
        overflow: hidden;
        background: #FFFFFF;
        font-family: 'Inter', sans-serif;
      }
      #root {
        position: relative;
        width: 1280px; height: 720px;
        background: #FFFFFF;
      }
      .clip-wrap { position: absolute; inset: 0; overflow: hidden; }
      .clip-wrap video {
        width: 100%; height: 100%;
        object-fit: cover; object-position: center;
        display: block;
      }
      .touch {
        position: absolute;
        font-family: 'Inter', sans-serif;
        z-index: 10;
      }
      .touch .kicker {
        font-size: 13px;
        font-weight: 700;
        color: #E63946;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        margin-bottom: 16px;
      }
      .touch .line {
        font-family: 'Anton', 'Inter', sans-serif;
        font-weight: 400;
        font-size: 56px;
        line-height: 1.0;
        text-transform: uppercase;
        letter-spacing: -0.005em;
        color: #0A0A0C;
        max-width: 480px;
      }
      .callout {
        position: absolute;
        left: 80px; top: 50%;
        transform: translateY(-50%);
        width: 380px;
        background: rgba(247, 247, 248, 0.96);
        border: 1px solid rgba(230, 57, 70, 0.40);
        border-radius: 8px;
        padding: 24px 28px;
        font-family: 'JetBrains Mono', monospace;
        backdrop-filter: blur(10px);
        z-index: 10;
      }
      .callout .ck {
        font-size: 11px; color: #E63946;
        letter-spacing: 0.32em; text-transform: uppercase;
        margin-bottom: 18px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(230, 57, 70, 0.20);
      }
      .callout .row {
        display: grid; grid-template-columns: 110px 1fr;
        gap: 14px; font-size: 13px; padding: 6px 0;
        letter-spacing: 0.18em; text-transform: uppercase;
      }
      .callout .row em { font-style: normal; color: #E63946; font-weight: 500; }
      .callout .row span { color: #0A0A0C; font-weight: 500; }
      .callout .foot {
        margin-top: 20px; font-size: 9px;
        color: #76767D; letter-spacing: 0.32em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="14.5" data-width="1280" data-height="720">

      <!-- ====================================================================
           PHOTOREAL CINEMATIC v9 — REAL MOTION
           Two Veo MP4s play full-resolution with their native motion (slow-mo
           reveal + spin + dolly + cheers + clink). Crossfade at 7s seam.
           HTML text overlays animate IN over the video at the right times.
           ==================================================================== -->

      <!-- CLIP A — Pristine Future Bottle: Elegant Reveal.
           Per hyperframes rule: video must NOT be nested inside a timed div.
           Wrapper is style-only; the <video> itself carries the timing. -->
      <div id="wrapA" class="clip-wrap">
        <video
          id="vidA"
          src="assets/clip-a.mp4"
          muted playsinline preload="auto"
          data-start="0" data-duration="7.5" data-track-index="1">
        </video>
      </div>

      <!-- CLIP B — Elegant Bottles: Future Minimalist Showcase. Overlaps Clip A from 6.5s for crossfade. -->
      <div id="wrapB" class="clip-wrap">
        <video
          id="vidB"
          src="assets/clip-b.mp4"
          muted playsinline preload="auto"
          data-start="6.5" data-duration="8" data-track-index="2">
        </video>
      </div>

      <!-- Text touch 01 — visible 2.0–4.0s during the spinning portion of Clip A -->
      <div id="t1" class="clip touch" data-start="2.0" data-duration="2.0" data-track-index="3"
           style="left: 70px; top: 110px;">
        <div class="kicker">01 ▸ Source</div>
        <div class="line">From the<br/>Andean&nbsp;páramo</div>
      </div>

      <!-- Text touch 02 — visible 4.0–5.5s during the dolly-in portion -->
      <div id="t2" class="clip touch" data-start="4.0" data-duration="1.5" data-track-index="3"
           style="right: 70px; top: 200px; text-align: right;">
        <div class="kicker">02 ▸ Altitude</div>
        <div class="line">3,600 m above<br/>sea&nbsp;level</div>
      </div>

      <!-- Text touch 03 — visible 5.5–6.8s during the pull-back/last spin -->
      <div id="t3" class="clip touch" data-start="5.5" data-duration="1.3" data-track-index="3"
           style="left: 70px; bottom: 90px;">
        <div class="kicker">03 ▸ Distance</div>
        <div class="line">Bottled &lt; 40 km<br/>from&nbsp;source</div>
      </div>

      <!-- Spec callout panel — visible 12.5–14.5s during Clip B's display pose -->
      <div id="c12" class="clip callout" data-start="12.5" data-duration="2.0" data-track-index="3">
        <div class="ck">▸ Label Zoom · Matte Black · 500ml</div>
        <div class="row"><em>pH</em><span>7.4</span></div>
        <div class="row"><em>TDS</em><span>280 ppm</span></div>
        <div class="row"><em>Source</em><span>Andean páramo</span></div>
        <div class="row"><em>Alt</em><span>3,600 m</span></div>
        <div class="row"><em>Bottled</em><span>Cartagena, CO</span></div>
        <div class="row"><em>Vintage</em><span>2026</span></div>
        <div class="foot">— Premiumwater · Loud edition —</div>
      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // === CROSSFADE between Clip A and Clip B at the 7s seam ===
      tl.from("#wrapB", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 6.5);
      tl.to("#wrapA", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 6.5);

      // === Text touch entrances/exits (slide up + fade) ===
      // Each exit ends with a tl.set hard-kill so non-linear scrubbing
      // doesn't leave stale opacity/y state.
      tl.from("#t1", { opacity: 0, y: 24, duration: 0.5, ease: "power3.out" }, 2.0);
      tl.to("#t1",   { opacity: 0, y: -16, duration: 0.4, ease: "power2.in" }, 3.6);
      tl.set("#t1",  { opacity: 0 }, 4.0);

      tl.from("#t2", { opacity: 0, y: 24, duration: 0.5, ease: "power3.out" }, 4.0);
      tl.to("#t2",   { opacity: 0, y: -16, duration: 0.4, ease: "power2.in" }, 5.1);
      tl.set("#t2",  { opacity: 0 }, 5.5);

      tl.from("#t3", { opacity: 0, y: 24, duration: 0.5, ease: "power3.out" }, 5.5);
      tl.to("#t3",   { opacity: 0, y: -16, duration: 0.4, ease: "power2.in" }, 6.5);
      tl.set("#t3",  { opacity: 0 }, 6.8);

      // === Spec callout reveal ===
      tl.from("#c12", { opacity: 0, x: -30, duration: 0.6, ease: "power3.out" }, 12.5);
      tl.from("#c12 .row", { opacity: 0, x: 12, duration: 0.4, stagger: 0.06, ease: "power3.out" }, 12.7);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
