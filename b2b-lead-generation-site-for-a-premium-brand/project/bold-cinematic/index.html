<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1280, height=720" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1280px; height: 720px;
        overflow: hidden;
        background: #FFFFFF;
      }
      #root {
        position: relative;
        width: 1280px; height: 720px;
        background: #FFFFFF;
      }
      .clip {
        position: absolute;
        inset: 0;
      }
      .clip img {
        width: 100%; height: 100%;
        object-fit: contain;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="12.5" data-width="1280" data-height="720">

      <!-- Storyboard frames exported from Figma file eTdC2DBlIQFDkHM2JVeS08
           and crossfaded via GSAP. Alternating tracks (1 / 2) so adjacent
           frames overlap by ~0.2s for smooth crossfade. -->

      <div id="f1"  class="clip" data-start="0.0"  data-duration="0.7"  data-track-index="1"><img src="assets/figma/frame-01.png" alt=""></div>
      <div id="f2"  class="clip" data-start="0.5"  data-duration="1.1"  data-track-index="2"><img src="assets/figma/frame-02.png" alt=""></div>
      <div id="f3"  class="clip" data-start="1.4"  data-duration="2.0"  data-track-index="1"><img src="assets/figma/frame-03.png" alt=""></div>
      <div id="f4"  class="clip" data-start="3.2"  data-duration="1.2"  data-track-index="2"><img src="assets/figma/frame-04.png" alt=""></div>
      <div id="f5"  class="clip" data-start="4.2"  data-duration="1.2"  data-track-index="1"><img src="assets/figma/frame-05.png" alt=""></div>
      <div id="f6"  class="clip" data-start="5.2"  data-duration="1.0"  data-track-index="2"><img src="assets/figma/frame-06.png" alt=""></div>
      <div id="f7"  class="clip" data-start="6.0"  data-duration="1.0"  data-track-index="1"><img src="assets/figma/frame-07.png" alt=""></div>
      <div id="f8"  class="clip" data-start="6.8"  data-duration="1.0"  data-track-index="2"><img src="assets/figma/frame-08.png" alt=""></div>
      <div id="f9"  class="clip" data-start="7.6"  data-duration="1.5"  data-track-index="1"><img src="assets/figma/frame-09.png" alt=""></div>
      <div id="f10" class="clip" data-start="8.9"  data-duration="0.9"  data-track-index="2"><img src="assets/figma/frame-10.png" alt=""></div>
      <div id="f11" class="clip" data-start="9.6"  data-duration="1.2"  data-track-index="1"><img src="assets/figma/frame-11.png" alt=""></div>
      <div id="f12" class="clip" data-start="10.6" data-duration="1.9"  data-track-index="2"><img src="assets/figma/frame-12.png" alt=""></div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Each frame fades in over its overlap window with the previous frame.
      // Hyperframes auto-hides each clip at its data-end, so no exit needed.
      const fadeIn = (id, t, dur) => tl.from(id, { opacity: 0, duration: dur, ease: "power2.out" }, t);

      fadeIn("#f1",  0.0,  0.25);
      fadeIn("#f2",  0.5,  0.4);
      fadeIn("#f3",  1.4,  0.4);
      fadeIn("#f4",  3.2,  0.4);
      fadeIn("#f5",  4.2,  0.4);
      fadeIn("#f6",  5.2,  0.4);
      fadeIn("#f7",  6.0,  0.4);
      fadeIn("#f8",  6.8,  0.4);
      fadeIn("#f9",  7.6,  0.4);
      fadeIn("#f10", 8.9,  0.2);   // clink — quick punch
      fadeIn("#f11", 9.6,  0.4);
      fadeIn("#f12", 10.6, 0.5);

      // === Beat-specific micro-motion (within each frame) ===

      // Frame 03 spinning — subtle horizontal nudge to suggest rotation
      tl.fromTo("#f3 img", { x: -8 }, { x: 8, duration: 2.0, ease: "sine.inOut" }, 1.4);

      // Frame 04 dolly-in — scale up from 1.0 to 1.06
      tl.fromTo("#f4 img", { scale: 1.0 }, { scale: 1.06, duration: 1.2, ease: "power2.out", transformOrigin: "50% 50%" }, 3.2);

      // Frame 05 pull-back — scale down from 1.06 to 1.0
      tl.fromTo("#f5 img", { scale: 1.06 }, { scale: 1.0, duration: 1.2, ease: "power2.inOut", transformOrigin: "50% 50%" }, 4.2);

      // Frame 06 last spin — gentle rotation -2 → 0
      tl.fromTo("#f6 img", { rotation: -2 }, { rotation: 0, duration: 1.0, ease: "sine.inOut" }, 5.2);

      // Frame 10 clink — quick scale-up on impact (1.0 → 1.04 → 1.0)
      tl.fromTo("#f10 img", { scale: 1.0 }, { scale: 1.04, duration: 0.2, ease: "power3.out", transformOrigin: "50% 50%" }, 8.9);
      tl.to("#f10 img", { scale: 1.0, duration: 0.5, ease: "power3.inOut" }, 9.1);

      // Frame 12 display pose — soft settle (scale 1.02 → 1.0)
      tl.fromTo("#f12 img", { scale: 1.02 }, { scale: 1.0, duration: 1.5, ease: "power3.out", transformOrigin: "50% 50%" }, 10.6);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
